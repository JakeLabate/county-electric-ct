name: vendor-project-images
on: [push]
permissions:
  contents: write
jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download project images from current site CDN
        run: |
          mkdir -p assets/projects
          curl -sSL -o "assets/projects/barnum-house.png" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/626956c43a0df06c6ae633b5_Barnum-House.png"
          curl -sSL -o "assets/projects/mapleview-tower-apartments.jpg" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/626956e819bb63114cef3aa8_Mapleview%20Towers.jpg"
          curl -sSL -o "assets/projects/market-square-apartments.jpg" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/626957375eea82e94e0e89c3_Market%20Square%20Apartments.jpg"
          curl -sSL -o "assets/projects/make-a-wish.jpg" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/623f8fffd47c050ad471dae2_ratio3x2_1800.jpg"
          curl -sSL -o "assets/projects/floor-and-decor.jpg" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/626957c4ed41e69ce4dd85c9_Floor%20%26%20Decor.jpg"
          curl -sSL -o "assets/projects/stress-factory.jpg" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/6241bd8c416e81e1463c3272_rawImage.jpg"
          curl -sSL -o "assets/projects/btx-global.png" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/626958573d6adba6b20a817f_BTX-Logistics.png"
          curl -sSL -o "assets/projects/jcc-woodbridge.jpg" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/6241bdd6416e81b4fc3c5fa7_mission%2520header_328267_resize_1524__1_1.jpg"
          curl -sSL -o "assets/projects/yard-house.jpg" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/626958ba32548f2e9ac37854_Yard%20House.jpg"
          curl -sSL -o "assets/projects/wren-kitchens.jpg" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/626958dd58c166a981796c2b_Wren%20Kitchens.jpg"
          curl -sSL -o "assets/projects/audi-greenwich.jpg" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/6241bf16b95758615d1a1378_136166518_3909311415748153_7102166450537586975_n.jpg"
          curl -sSL -o "assets/projects/10-willard-road-apartments.jpg" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/62695922d1a96924ffae0458_Willard%20Road%20Apartments.jpg"
          curl -sSL -o "assets/projects/fedex-logistics-center.jpg" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/62695943ed41e65287de4f82_FED%20EX.jpg"
          curl -sSL -o "assets/projects/newfield-apartments.jpg" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/627aabae39b0fc71a35e9315_Newfield%20Apartments%20(1).jpg"
          curl -sSL -o "assets/projects/silver-hill-hospital.jpeg" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/6241c2974217275e17278807_medium.jpeg"
          curl -sSL -o "assets/projects/key-hyundai.jpg" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/6241c0d5db7ffb3f7a86ba97_245774308_10158529877351089_187118520854389501_n.jpg"
          curl -sSL -o "assets/projects/fairfield-university.jpg" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/626959b30b169e4edf54ea95_Fairfield%20University%20Townhouses.jpg"
          curl -sSL -o "assets/projects/sacred-heart-university.jpg" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/6241c2513d49c406addd13ce_Grad_CHE_Exterior-1220X686.jpg"
          curl -sSL -o "assets/projects/mercedes-benz-of-greenwich.jpg" "https://cdn.prod.website-files.com/62362884bcf9f0bc7e66d07c/6238dd91328150874fa338f4_CECI-13-1.jpg"
          curl -sSL -o "assets/projects/10-willard-road-apartments-aerial.jpeg" "https://cdn.prod.website-files.com/622fa7e7f563138da06751e0/625a0328b3e1250b2008a345_6241bf4e4c697992781c7696_10-Willard-aerial.jpeg"
          curl -sSL -o "assets/projects/candidate-ceci-13.jpg" "https://cdn.prod.website-files.com/622fa7e7f563138da06751e0/62339fc4eda1053e99560f99_CECI-13.jpg"
          curl -sSL -o "assets/projects/candidate-unknown.jpeg" "https://cdn.prod.website-files.com/622fa7e7f563138da06751e0/625a0320273c1d2c1f68af5b_624da283f5d00518560ce5a8_image.jpeg"
          ls -la assets/projects
      - name: Commit
        run: |
          git config user.name "asset-vendor"
          git config user.email "actions@users.noreply.github.com"
          git add assets
          git commit -m "Vendor project images from current site" || echo "nothing to commit"
          git push
